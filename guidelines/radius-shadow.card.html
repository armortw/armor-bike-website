<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & shadow" subtitle="Mostly-square corners; lift on hover" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-subtle); font-family: var(--font-sans); display: flex; gap: 26px; align-items: center; }
  .box { width: 96px; height: 84px; background: var(--surface-card); border: 1px solid var(--border-subtle); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 7px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .pill { width: 96px; height: 44px; align-self: center; }
</style>
</head>
<body>
  <div class="box" style="border-radius:var(--radius-sm)">sm 3px</div>
  <div class="box" style="border-radius:var(--radius-md)">md 6px</div>
  <div class="box pill" style="border-radius:var(--radius-pill)">pill</div>
  <div class="box" style="border-radius:var(--radius-sm); box-shadow:var(--shadow-sm); border-color:transparent">shadow-sm</div>
  <div class="box" style="border-radius:var(--radius-sm); box-shadow:var(--shadow-card-hover); border-color:transparent">hover lift</div>
</body>
</html>
