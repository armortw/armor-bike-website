<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); display: flex; height: 180px; }
  .panel { flex: 1; display: flex; align-items: center; justify-content: center; }
  .on-blue { background: var(--surface-header); }
  .on-light { background: var(--surface-page); border-left: 1px solid var(--border-subtle); }
  img { width: 232px; }
</style>
</head>
<body>
  <div class="panel on-blue"><img src="../assets/logo-armorbike-on-blue.svg" alt="ARMOR BIKE on blue"></div>
  <div class="panel on-light"><img src="../assets/logo-armorbike-on-light.svg" alt="ARMOR BIKE on light"></div>
</body>
</html>
