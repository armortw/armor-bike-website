<!-- @dsCard group="Colors" viewport="700x150" name="Blue ramp" subtitle="Tints & shades of the signature brand blue" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .ramp { display: flex; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .step { flex: 1; height: 92px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 11px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--blue-50)">50</div>
    <div class="step" style="background:var(--blue-100)">100</div>
    <div class="step" style="background:var(--blue-200)">200</div>
    <div class="step" style="background:var(--blue-300);color:#fff">300</div>
    <div class="step" style="background:var(--blue-400);color:#fff">400</div>
    <div class="step" style="background:var(--blue-500);color:#fff">500</div>
    <div class="step" style="background:var(--blue-600);color:#fff">600</div>
    <div class="step" style="background:var(--blue-700);color:#fff">700</div>
    <div class="step" style="background:var(--blue-800);color:#fff">800</div>
    <div class="step" style="background:var(--blue-900);color:#fff">900</div>
  </div>
</body>
</html>
