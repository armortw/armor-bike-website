<!-- @dsCard group="Type" viewport="700x200" name="Display type" subtitle="Archivo — headings, hero & prices" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .display { font-family: var(--font-display); color: var(--text-strong); line-height: 1.05; letter-spacing: -0.02em; }
  .l1 { font-size: 46px; font-weight: 900; }
  .l2 { font-size: 28px; font-weight: 800; margin-top: 10px; }
  .price { font-family: var(--font-display); font-weight: 800; font-size: 30px; color: var(--text-strong); margin-top: 14px; }
  .price span { color: var(--text-muted); font-size: 18px; }
  .lbl { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 4px; }
</style>
</head>
<body>
  <div class="display l1">Ride further, faster</div>
  <div class="lbl">Archivo Black 900 · --text-5xl</div>
  <div class="display l2">Kids Mountain Bikes</div>
  <div class="lbl">Archivo ExtraBold 800 · --text-3xl</div>
  <div class="price">1.427,73&nbsp;<span>€*</span></div>
  <div class="lbl">Price · Archivo ExtraBold 800</div>
</body>
</html>
