<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base step" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .item { display: flex; align-items: center; gap: 14px; }
  .bar { height: 16px; background: var(--blue-500); border-radius: 2px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="item"><div class="bar" style="width:8px"></div><span class="tag">--space-2 · 8px</span></div>
    <div class="item"><div class="bar" style="width:16px"></div><span class="tag">--space-4 · 16px</span></div>
    <div class="item"><div class="bar" style="width:24px"></div><span class="tag">--space-6 · 24px</span></div>
    <div class="item"><div class="bar" style="width:32px"></div><span class="tag">--space-8 · 32px</span></div>
    <div class="item"><div class="bar" style="width:48px"></div><span class="tag">--space-12 · 48px</span></div>
    <div class="item"><div class="bar" style="width:64px"></div><span class="tag">--space-16 · 64px</span></div>
  </div>
</body>
</html>
