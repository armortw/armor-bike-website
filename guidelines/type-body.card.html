<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); color: var(--text-body); }
  .eyebrow { font-weight: 700; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-strong); }
  .body { font-size: 15px; line-height: 1.5; max-width: 560px; margin-top: 8px; }
  .muted { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  .link { color: var(--text-link); font-weight: 600; font-size: 15px; margin-top: 8px; display: inline-block; }
  .lbl { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 4px; }
</style>
</head>
<body>
  <div class="eyebrow">Norco Bicycles</div>
  <div class="lbl">Eyebrow / manufacturer · Bold 700 uppercase</div>
  <div class="body">Fluid FS Youth — a 24″ full-suspension kids' mountain bike built for confident trail riding, with progressive geometry and reliable disc brakes.</div>
  <div class="lbl">Body · Regular 400 · --text-md</div>
  <div class="muted">Mountainbike · 2026 · dark green</div>
  <a class="link" href="#">Show more →</a>
</body>
</html>
