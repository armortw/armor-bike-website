<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARMOR BIKE｜後台管理系統</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0f4f8; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  <script>
    (function () {
      var deploy = new URLSearchParams(window.location.search).get("deploy") || Date.now().toString(36);
      window.__ARMOR_DEPLOY_PARAM__ = deploy;
      document.write('<script src="store-data.js?deploy=' + encodeURIComponent(deploy) + '"><\/script>');
      document.write('<script src="cms-users.js?deploy=' + encodeURIComponent(deploy) + '" onerror="window.CMS_USERS=window.CMS_USERS||[]"><\/script>');
      document.write('<script type="text/babel" src="admin-app.jsx?deploy=' + encodeURIComponent(deploy) + '"><\/script>');
    })();
  </script>
</body>
</html>
